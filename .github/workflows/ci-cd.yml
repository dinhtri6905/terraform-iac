name: CI/CD Pipeline with CaC
on:
  push:
    branches:
      - main
      - stage
      - develop
      - feature/**
    paths:
      - 'terraform-bootstrap/**'
      - 'terraform-infra/**'
      - '.github/workflows/**'
      - 'policies/**'
  pull_request:
    branches:
      - main
      - stage
      - develop
    paths:
      - 'terraform-bootstrap/**'
      - 'terraform-infra/**'
      - '.github/workflows/**'
      - 'policies/**'
  workflow_dispatch:
env:
  AWS_REGION: ap-southeast-1
  TERRAFORM_VERSION: 1.8.0
  BUCKET_TF_STATE: ${{ secrets.BUCKET_TF_STATE }}
  SOFT_FAIL: ${{ startsWith(github.ref, 'refs/heads/feature/') }}

jobs:
  validate:
    name: Validate and format tf files
    runs-on: ubuntu-latest
    defaults:
      run: 
        shell: bash
        working-directory: ./terraform-infra
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Setup tf
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  checkov-scan:
    name: Security Scan with Checkov
    permissions:
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run checkov
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with: 
          directory: .
          framework: terraform
          output_format: sarif
          output_file_path: reports/checkov.sarif
          skip_check: CKV_AWS_1,CKV_AWS_21
          skip_download: false
          soft_fail: ${{ env.SOFT_FAIL }}

      - name: Upload results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/checkov.sarif
          category: Checkov Terraform Scan

      - name: Upload Checkov Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-report
          path: reports/checkov.sarif

      - name: Comment PR with Checkov Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('./reports/checkov.sarif', 'utf8'));
            let comment = '## Checkov Security Scan Results\n\n';
            
            if (results.runs[0].results.length === 0) {
              comment += 'No security issues found!';
            } else {
              comment += `Found ${results.runs[0].results.length} issues\n\n`;
              // Limit to first 5 results in PR comment
              results.runs[0].results.slice(0, 5).forEach((result, idx) => {
                comment += `${idx + 1}. **${result.ruleId}** - ${result.message.text}\n`;
              });
              if (results.runs[0].results.length > 5) {
                comment += `\n_... and ${results.runs[0].results.length - 5} more issues_`;
              }
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
  
  tflint:
    name: TFLint Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: write 
      pull-requests: write 
      id-token: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v3
        with:
          tflint_version: latest

      - name: Init TFLint
        run: |
          cd terraform-infra
          tflint --init

      - name: Run TFLint
        run: |
          cd terraform-infra
          tflint --format json > ${{ runner.temp }}/tflint-report.json || true
          cat ${{ runner.temp }}/tflint-report.json
      
      - name: Upload TFLint Report
        uses: actions/upload-artifact@v4
        with:
          name: tflint-report
          path: ${{ runner.temp }}/tflint-report.json

      - name: Comment PR with TFLint Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('${{ runner.temp }}/tflint-report.json', 'utf8'));
            let comment = '## TFLint Analysis Results\n\n';
            
            if (results.issues.length === 0) {
              comment += 'No linting issues found!';
            } else {
              comment += `Found ${results.issues.length} issues\n\n`;
              results.issues.slice(0, 10).forEach((issue, idx) => {
                comment += `${idx + 1}. **${issue.rule.name}** (${issue.range.filename}:${issue.range.start.line})\n`;
                comment += `   - ${issue.message}\n`;
              });
              if (results.issues.length > 10) {
                comment += `\n_... and ${results.issues.length - 10} more issues_`;
              }
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  opa-compliance:
    name: OPA/Rego Policy Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup OPA
        run: |
          mkdir -p /tmp/opa
          curl -L -o /tmp/opa/opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64
          chmod +x /tmp/opa/opa
          /tmp/opa/opa version

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Generate Terraform Plan JSON
        run: |
          cd terraform-infra  
          terraform init -backend-config="bucket=$BUCKET_TF_STATE"
          terraform plan -out=tfplan
          terraform show -json tfplan > ${{ runner.temp }}/tf-plan.json

      - name: Run OPA Policy Checks
        run: |
          /tmp/opa/opa eval \
            -d policies/ \
            -I \
            "data.terraform.deny" \
            < ${{ runner.temp }}/tf-plan.json \
            > ${{ runner.temp }}/opa-results.json || true

      - name: Upload OPA Report
        uses: actions/upload-artifact@v4
        with:
          name: opa-report
          path: ${{ runner.temp }}/opa-results.json

  generate-reports:
    name: Generate Compliance Reports
    runs-on: ubuntu-latest
    permissions:
      contents: write 
      pull-requests: write 
      id-token: write 
    needs: [validate, checkov-scan, tflint, opa-compliance]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: reports/
          merge-multiple: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Generate Documentation
        run: |
          mkdir -p reports
          cd terraform-infra  
          terraform init -backend=false
          
          # Generate outputs documentation
          echo "# Terraform Outputs Documentation" > ../reports/outputs-docs.md
          echo "" >> ../reports/outputs-docs.md
          cat outputs.tf >> ../reports/outputs-docs.md

      - name: Setup Python for Report Generation
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Generate Compliance HTML Report
        run: |
          python3 scripts/generate_compliance_report.py --reports-dir reports
      
      - name: Display Report Summary
        run: |
          echo "## Compliance Reports Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The following reports are available as artifacts:" >> $GITHUB_STEP_SUMMARY
          echo "- **Compliance HTML Report**: compliance-report-*.html" >> $GITHUB_STEP_SUMMARY
          echo "- **Checkov Results**: checkov.sarif" >> $GITHUB_STEP_SUMMARY
          echo "- **TFLint Results**: tflint-report.json" >> $GITHUB_STEP_SUMMARY
          echo "- **OPA Results**: opa-results.json" >> $GITHUB_STEP_SUMMARY
          echo "- **Documentation**: outputs-docs.md" >> $GITHUB_STEP_SUMMARY

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: compliance-reports
          path: |
            reports/
      
      


      - name: Comment PR with Compliance Summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            let comment = '## 📊 Infrastructure Compliance Report\n\n';
            
            // Check for Checkov results
            if (fs.existsSync('./reports/checkov.sarif')) {
              const checkov = JSON.parse(fs.readFileSync('./reports/checkov.sarif', 'utf8'));
              const checkIssues = checkov.runs[0].results.length;
              comment += `### Checkov Scan\n- **Issues Found**: ${checkIssues}\n\n`;
            }
            
            // Check for TFLint results
            if (fs.existsSync('./reports/tflint-report.json')) {
              const tflint = JSON.parse(fs.readFileSync('./reports/tflint-report.json', 'utf8'));
              const lintIssues = tflint.issues.length;
              comment += `### TFLint Analysis\n- **Issues Found**: ${lintIssues}\n\n`;
            }
            
            comment += `### 📥 Artifacts\nDownload the **Compliance HTML Report** artifact to view full details!\n\n`;
            comment += `All compliance and security scanning completed!`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Notify Slack Channel       
        if: always() 
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_TITLE: "CI/CD Pipeline Status"
          SLACK_MESSAGE: "Trạng thái chạy Pipeline của nhánh ${{ github.ref_name }}: ${{ job.status }}"

  deploy:
    name: Deploy infra
    runs-on: ubuntu-latest
    needs: [validate, checkov-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run: 
        shell: bash
        working-directory: ./terraform-infra
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Setup Terraform 
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform init
        run: terraform init -backend-config="bucket=$BUCKET_TF_STATE"

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -out=tfplan
          terraform show -json tfplan > tfplan.json

      - name: Plan status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan 

      - name: Capture Outputs
        run: terraform output -json > ${{ runner.temp }}/outputs.json

  destroy:
    name: Destroy infra
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    defaults:
      run: 
        shell: bash
        working-directory: ./terraform-infra
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Setup Terraform 
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform init
        run: terraform init -backend-config="bucket=$BUCKET_TF_STATE"

      - name: Terraform Destroy Plan
        id: destroy_plan
        run: terraform plan -destroy -out=tfplan_destroy

      - name: Destroy Plan status
        if: steps.destroy_plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -no-color
        env:
          TF_INPUT: false