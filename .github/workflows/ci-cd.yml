name: CI/CD Pipeline with CaC
on:
  push:
    branches:
      - main
      - stage
      - develop
      - feature/**
    paths:
      - 'terraform-bootstrap/**'
      - 'terraform-infra/**'
      - '.github/workflows/**'
      - 'policies/**'
  pull_request:
    branches:
      - main
      - stage
      - develop
    paths:
      - 'terraform-bootstrap/**'
      - 'terraform-infra/**'
      - '.github/workflows/**'
      - 'policies/**'
  workflow_dispatch:
env:
  AWS_REGION: ap-southeast-1
  TERRAFROM_VESION: 1.8.0
  BUCKET_TF_STATE: ${{ secrets.BUCKET_TF_STATE }}

jobs:
  validate:
    name: Validate and format tf files
    runs-on: ubuntu-latest
    defaults:
      run: 
        shell: bash
        working-directory: ./terraform-infra
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Setup tf
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFROM_VESION }}

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate
  checkov-scan:
    name: Security Scan with Checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run checkov
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with: 
          directory: .
          framework: terraform
          output_format: sarif
          output_file_path: reports/checkov.sarif
          soft_fail: false
          skip_check: CKV_AWS_1,CKV_AWS_21
          skip_download: false

      - name: Upload results
        if: always()
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: reports/checkov.sarif
          category: Checkov Terraform Scan

      - name: Comment PR with Checkov Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('./reports/checkov.sarif', 'utf8'));
            let comment = '## Checkov Security Scan Results\n\n';
            
            if (results.runs[0].results.length === 0) {
              comment += 'No security issues found!';
            } else {
              comment += `Found ${results.runs[0].results.length} issues\n\n`;
              // Limit to first 5 results in PR comment
              results.runs[0].results.slice(0, 5).forEach((result, idx) => {
                comment += `${idx + 1}. **${result.ruleId}** - ${result.message.text}\n`;
              });
              if (results.runs[0].results.length > 5) {
                comment += `\n_... and ${results.runs[0].results.length - 5} more issues_`;
              }
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  deploy:
    name: Deploy infra
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run: 
        shell: bash
        working-directory: ./terraform-infra
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Setup Terraform 
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFROM_VESION }}

      - name: Terraform init
        run: terraform init -backend-config="bucket=$BUCKET_TF_STATE"

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -out=tfplan
          terraform show -json tfplan > tfplan.json

      - name: Plan status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan 

      - name: Capture Outputs
        run: terraform output -json > ${{ runner.temp }}/outputs.json

  destroy:
    name: Destroy infra
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    defaults:
      run: 
        shell: bash
        working-directory: ./terraform-infra
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Setup Terraform 
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFROM_VESION }}

      - name: Terraform init
        run: terraform init -backend-config="bucket=$BUCKET_TF_STATE"

      - name: Terraform Destroy Plan
        id: destroy_plan
        run: terraform plan -destroy -out=tfplan_destroy

      - name: Destroy Plan status
        if: steps.destroy_plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -no-color
        env:
          TF_INPUT: false