name: CI/CD Pipeline with CaC
on:
  push:
    branches:
      - main
      - stage
      - develop
    paths:
      - 'terraform/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
      - stage
      - develop
    paths:
      - 'terraform/**'
      - '.github/workflows/**'
env:
  AWS_REGION: us-east-1
  TERRAFROM_VESION: 1.5.0

jobs:
  validate:
    name: Validate and format tf files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Setup tf
        uses: harshicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFROM_VESION }}

      - name: Terraform fmt check
        run: |
          cd terraform
          terraform fmt -check -recursive

      - name: Terraform init
        run: |
          cd terraform
          terraform init -backend=false

      - name: Terraform validate
        run: |
          cd terraform
          terraform validate

  deploy:
    name: Deploy infra
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Terraform Plan
        id: plan
        run: |
          cd terraform
          terraform plan -out=tfplan
          terraform show -json tfplan > tfplan.json

      - name: Plan status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform apply
        run: |
          cd terraform
          terraform apply tfplan

      - name: Capture Outputs
        run: |
          cd terraform
          terraform output -json > ${{ runner.temp }}/outputs.json